<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>그룹(반) 관리 - 세븐닷 학원장 관리자</title>
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="agroup" data-mode="principal">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">

        <div class="page-header">
          <div>
            <h2>그룹(반) 관리</h2>
            <p class="cd-page-sub">반별 콘텐츠 레벨을 정하고, 진단 완료 학생을 반에 배정합니다.</p>
          </div>
        </div>

        <section class="cd-view active" id="view-agroup">

          <div class="cd-brick-2col">

            <!-- 좌: 배정 대기 + 그룹 목록 -->
            <div>
              <div class="section-box" style="margin-bottom:16px">
                <div class="section-head">
                  <div class="title">반 배정 대기 <span class="muted" id="agUnassignedCount">0명</span></div>
                </div>
                <div class="section-body">
                  <p class="cd-desc" style="margin-bottom:10px">진단테스트를 마친 학생입니다. 진단 레벨에 맞는 반에 배정하세요.</p>
                  <div id="agUnassigned"></div>
                </div>
              </div>
              <div class="section-box cd-content-left">
                <div class="section-head">
                  <div class="title">반 목록</div>
                  <button class="btn-sm" type="button" data-action="printDoc">+ 그룹 생성</button>
                </div>
                <div class="section-body cd-bank-list-body">
                  <div id="agGroupList"></div>
                </div>
              </div>
            </div>

            <!-- 우: 선택 반 상세 (레벨 + 학생) -->
            <div class="section-box">
              <div class="section-head">
                <div class="cd-content-hd">
                  <div class="cd-content-hd-title" id="agDetailName">반</div>
                  <div class="cd-desc" id="agDetailMeta"></div>
                </div>
              </div>
              <div class="section-body">
                <div class="cd-bank-sub-title">반 기본 콘텐츠 레벨</div>
                <p class="cd-desc" style="margin-bottom:10px">이 반 학생의 기본 레벨입니다. 학생별로 다르면 아래에서 개별 조정하세요.</p>
                <div class="cd-ag-bases" id="agBaseLevels"></div>

                <div class="cd-bank-sub-title" style="margin-top:20px">학생 목록</div>
                <div class="tbl">
                  <table class="tbl">
                    <thead><tr><th>학생</th><th class="center">국어</th><th class="center">영어</th><th class="center">수학</th><th class="center">조정</th></tr></thead>
                    <tbody id="agRoster"></tbody>
                  </table>
                </div>
              </div>
            </div>

          </div>

          <div class="guideBox tip">
            <p>레벨은 ‘반 기본’을 따르되, 진단 결과가 다른 학생만 개별(override)로 조정합니다.</p>
            <ul><li>진단 완료 → 반 배정 → (필요 시) 학생별 레벨 조정 순서로, 여러 반·학생을 빠르게 세팅할 수 있어요.</li></ul>
          </div>

        </section>

        <div id="site-footer-mount"></div>
      </div>
    </div>

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
