<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>워크시트 - 세븐닷 교사용 관리자</title>
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="worksheet">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">

        <div class="page-header">
          <div>
            <h2>워크시트</h2>
            <p class="cd-page-sub">과목·레벨·회차별 학습지를 미리 보고 인쇄해 수업에 활용합니다.</p>
          </div>
        </div>

        <section class="cd-view active" id="view-worksheet">

          <div class="cd-view-toolbar">
            <div class="cd-desc">과목과 레벨로 학습지를 찾으세요.</div>
            <div class="cd-content-filters">
              <select class="form-select" id="wsSubjectFilter">
                <option>전체 과목</option>
                <option>국어</option>
                <option>영어</option>
                <option>수학</option>
              </select>
              <select class="form-select" id="wsLevelFilter">
                <option>전체 레벨</option>
                <option>레벨 1-1</option>
                <option>A-1</option>
              </select>
            </div>
          </div>

          <div class="section-box">
            <div class="section-head">
              <div class="title">학습지 목록</div>
              <span class="cd-desc">총 <b id="worksheetCount">0</b>개</span>
            </div>
            <div class="section-body tbl">
              <table class="tbl">
                <thead><tr><th>과목</th><th>레벨</th><th>회차</th><th>영역</th><th class="center">문항수</th><th class="center">미리보기</th></tr></thead>
                <tbody id="worksheetRows"></tbody>
              </table>
            </div>
          </div>

          <div class="guideBox tip">
            <p>워크시트는 학생이 푸는 학습지와 동일한 문항으로 구성됩니다.</p>
            <ul><li>미리보기에서 ‘정답 보기’로 교사용 정답을 확인하고, 인쇄해 오프라인 수업·과제로 활용하세요. 문항 오류는 ‘콘텐츠 미리보기’에서 신고할 수 있어요.</li></ul>
          </div>

        </section>

        <div id="site-footer-mount"></div>
      </div>
    </div>

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
