<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학습 보고서 - 세븐닷 교사용 관리자</title>
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="learnreport">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">

        <div class="page-header">
          <div>
            <h2>학습 보고서</h2>
            <p class="cd-page-sub">학생별로 발행된 주간·월간 학습 보고서를 확인하고 출력합니다.</p>
          </div>
        </div>

        <section class="cd-view active" id="view-learnreport">

          <div class="cd-view-toolbar">
            <div class="cd-desc">‘상세 보기’를 누르면 학생의 학습 보고서로 이동합니다.</div>
            <div class="cd-content-filters">
              <select class="form-select" id="lrTypeFilter">
                <option>전체 유형</option>
                <option>주간</option>
                <option>월간</option>
              </select>
            </div>
          </div>

          <div class="section-box">
            <div class="section-head">
              <div class="title">발행 보고서</div>
              <span class="cd-desc">총 <b id="learnReportCount">0</b>건</span>
            </div>
            <div class="section-body tbl">
              <table class="tbl">
                <thead><tr><th>학생</th><th>학년</th><th>보고서</th><th class="center">유형</th><th class="center">작성일</th><th class="center">동작</th></tr></thead>
                <tbody id="learnReportRows"></tbody>
              </table>
            </div>
          </div>

          <div class="guideBox tip">
            <p>학습 보고서는 학생의 주간·월간 학습 현황을 요약한 발행 문서입니다.</p>
            <ul><li>상세 보기에서 진도·정답률·일별 학습을 확인하고, 인쇄해 학부모와 공유할 수 있어요.</li></ul>
          </div>

        </section>

        <div id="site-footer-mount"></div>
      </div>
    </div>

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
