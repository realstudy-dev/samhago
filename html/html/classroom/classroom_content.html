<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세븐닷 콘텐츠 - 세븐닷 교사용 관리자</title>
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="content">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">

        <div class="page-header">
          <div>
            <h2>세븐닷 콘텐츠</h2>
            <p class="cd-page-sub">국영수 일일·주간 테스트와 중간·기말 평가 문항을 미리 보고, 문항별로 오답·교정을 신고합니다.</p>
          </div>
        </div>

        <section class="cd-view active" id="view-content">

          <div class="cd-view-toolbar">
            <div class="cd-desc">과목과 유형을 골라 문항을 확인하세요.</div>
            <div class="cd-content-filters">
              <select class="form-select" id="contentSubjectFilter">
                <option>전체 과목</option>
                <option>국어</option>
                <option>영어</option>
                <option>수학</option>
              </select>
              <select class="form-select" id="contentTypeFilter">
                <option>전체 유형</option>
                <option>일일 테스트</option>
                <option>주간 테스트</option>
                <option>중간 평가</option>
                <option>기말 평가</option>
              </select>
            </div>
          </div>

          <div class="cd-brick-2col">

            <!-- 콘텐츠(세트) 목록 -->
            <div class="section-box cd-content-left">
              <div class="section-head">
                <div class="title">콘텐츠 목록 <span class="muted" id="contentRoundCount"></span></div>
              </div>
              <div class="section-body cd-bank-list-body">
                <div id="contentRoundList"></div>
              </div>
            </div>

            <!-- 문항 상세 -->
            <div class="section-box cd-bank-right" id="contentDetailPanel">
              <div class="cd-bank-empty-state" id="contentEmptyState">
                <span class="material-symbols-outlined cd-empty-ico">quiz</span>
                <b>왼쪽에서 콘텐츠를 선택하면<br />문항 구성을 볼 수 있어요</b>
                <p class="cd-desc">문항마다 ‘신고·교정’으로 오류를 알릴 수 있어요.</p>
              </div>

              <div id="contentDetailBody" hidden>
                <div class="section-head">
                  <div class="cd-content-hd" id="contentHd"></div>
                </div>
                <div class="section-body">
                  <div class="cd-content-items" id="contentItems"></div>

                  <div class="cd-content-reports-wrap">
                    <div class="cd-bank-sub-title">신고·교정 내역 <span class="muted" id="contentReportCount"></span></div>
                    <div class="cd-content-reports" id="contentReports"></div>
                  </div>
                </div>
              </div>
            </div>

          </div>

          <div class="guideBox tip">
            <p>여기서 보는 문항은 학생 앱에 제공되는 실제 테스트·평가 문항과 동일합니다.</p>
            <ul><li>정답 오류·해설 오류·오탈자나 더 좋은 표현이 있으면 문항의 ‘신고·교정’으로 알려주세요. 세븐닷 콘텐츠팀이 검토 후 반영합니다.</li></ul>
          </div>

        </section>

        <div id="site-footer-mount"></div>
      </div>
    </div>

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
