<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>설정 - 세븐닷 교사용 관리자</title>

    <!-- 통일 디자인 시스템 (실제 앱과 동일) -->
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <!-- Google Material Symbols (아이콘 통일) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <!-- 페이지 전용 스타일 -->
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="settings">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">
      <!-- 페이지 헤더 + 반 선택 -->
      <div class="page-header">
        <div>
          <h2>설정</h2>
        </div>
      </div>

      <!-- ==== 설정 ==== -->
      <section class="cd-view active" id="view-settings">
        <div class="cd-view-toolbar">
          <div class="cd-desc">반 정보, 보상 기준, 포인트장터 운영 기준을 설정합니다.</div>
          <button class="btn primary" type="button" data-action="saveSettings">설정 저장</button>
        </div>
        <div class="section-box">
          <div class="section-body">
            <div class="cd-setting-list">
              <div class="cd-setting-row"><span><b>반명</b><span class="cd-desc">4학년 1반</span></span><button class="btn-sm" type="button">수정</button></div>
              <div class="cd-setting-row"><span><b>학습 완료 보상</b><span class="cd-desc">오늘 학습 완료 시 5포인트 지급</span></span><button class="btn-sm" type="button">수정</button></div>
              <div class="cd-setting-row"><span><b>포인트장터 운영</b><span class="cd-desc">공개 쿠폰만 학생 화면에 표시</span></span><button class="btn-sm" type="button">관리</button></div>
              <div class="cd-setting-row"><span><b>공동목표</b><span class="cd-desc">학생 포인트머니 합산으로 달성률 표시</span></span><button class="btn-sm" type="button">수정</button></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <div id="site-footer-mount"></div>
      </div><!-- /.content_area -->
    </div>

    <!-- 공통 모달: ../common/classroom-modals.js 가 body 끝에 주입 -->

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
