<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시판 - 세븐닷 교사용 관리자</title>
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="board">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">

        <div class="page-header">
          <div>
            <h2>게시판</h2>
            <p class="cd-page-sub">학생이 세븐닷을 열면 가장 먼저 보게 되는 공지 화면을 관리합니다.</p>
          </div>
        </div>

        <section class="cd-view active" id="view-board">

          <!-- ── ZONE 1: 현재 게시 중인 게시판 ── -->
          <div class="section-box cd-board-live" id="boardLiveCard">
            <div class="section-head">
              <div class="title">
                <span class="material-symbols-outlined" style="font-size:18px;vertical-align:-4px;color:var(--c-brand)">campaign</span>
                지금 학생 화면에 게시 중
              </div>
              <div class="cd-head-actions">
                <span class="badge success">게시 중</span>
                <span class="cd-desc" id="boardLiveMeta"></span>
                <button class="btn-sm" type="button" data-action="dupMorning" data-i="0">복제해서 수정</button>
                <button class="btn-sm reject" type="button" data-action="stopBoard">게시 중단</button>
              </div>
            </div>
            <div class="section-body cd-board-live-body">
              <div class="cd-board-live-title" id="boardLiveTitle"></div>
              <div class="cd-board-preview-rows">
                <div class="cd-bpr">
                  <span class="cd-bpr-ico"><span class="material-symbols-outlined">schedule</span></span>
                  <div class="cd-bpr-main"><span class="cd-bpr-label">오늘의 수업</span><div class="cd-period-list" id="boardLiveSubj"></div></div>
                </div>
                <div class="cd-bpr">
                  <span class="cd-bpr-ico"><span class="material-symbols-outlined">backpack</span></span>
                  <div class="cd-bpr-main"><span class="cd-bpr-label">수업 준비</span><span id="boardLiveReady"></span></div>
                </div>
                <div class="cd-bpr">
                  <span class="cd-bpr-ico"><span class="material-symbols-outlined">wb_sunny</span></span>
                  <div class="cd-bpr-main"><span class="cd-bpr-label">아침활동</span><span id="boardLiveMorning"></span></div>
                </div>
                <div class="cd-bpr">
                  <span class="cd-bpr-ico"><span class="material-symbols-outlined">campaign</span></span>
                  <div class="cd-bpr-main"><span class="cd-bpr-label">전달사항</span><span id="boardLiveNotice"></span></div>
                </div>
              </div>
            </div>
          </div>

          <!-- 게시 없을 때 empty state -->
          <div class="cd-empty-hero" id="boardEmptyState" hidden>
            <span class="material-symbols-outlined cd-empty-ico">campaign</span>
            <b>지금 학생들이 볼 수 있는 게시판이 없습니다</b>
            <p class="cd-desc">게시판을 작성하면 학생이 세븐닷을 열었을 때 가장 먼저 보게 됩니다.</p>
            <button class="btn primary" type="button" data-action="openBoardWrite">게시판 작성하기</button>
          </div>

          <!-- ── ZONE 2: 게시 이력 + 복제 ── -->
          <div class="section-box">
            <div class="section-head">
              <div class="title">게시 이력</div>
              <div class="cd-head-actions">
                <span class="cd-desc">클릭하면 내용 확인 및 복제를 할 수 있습니다</span>
                <button class="btn-sm" type="button" data-action="openBoardWrite">+ 새 게시판 작성</button>
              </div>
            </div>
            <div class="section-body tbl">
              <table class="tbl">
                <thead><tr><th>제목</th><th>대상</th><th>게시일</th><th class="right">관리</th></tr></thead>
                <tbody id="boardHistory"></tbody>
              </table>
            </div>
          </div>

        </section>

        <div id="site-footer-mount"></div>
      </div>
    </div>

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
