<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생 - 세븐닷 교사용 관리자</title>

    <!-- 통일 디자인 시스템 (실제 앱과 동일) -->
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <!-- Google Material Symbols (아이콘 통일) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <!-- 페이지 전용 스타일 -->
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="students">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">
      <!-- 페이지 헤더 + 반 선택 -->
      <div class="page-header">
        <div>
          <h2>학생</h2>
        </div>
      </div>

      <!-- ==== 학생 ==== -->
      <section class="cd-view active" id="view-students">
        <div class="cd-view-toolbar">
          <div class="cd-desc">학생 명단을 등록·수정·삭제합니다. 행을 누르면 학생 상세(학습 결과·포인트 내역·리포트)를 확인할 수 있습니다.</div>
          <div class="cd-head-actions">
            <button class="btn" type="button" data-action="openBulk">학생 일괄 등록</button>
            <button class="btn primary" type="button" data-action="openStudent">＋ 학생 등록</button>
          </div>
        </div>
        <div class="section-box">
          <div class="nt-search">
            <input type="search" id="rosterSearch" class="form-input" placeholder="학생 이름 검색" />
          </div>
          <div class="section-body tbl">
            <table class="tbl">
              <thead><tr><th class="center">번호</th><th>학생명</th><th>로그인 아이디(이메일)</th><th class="center">학년</th><th class="center">레벨</th><th class="center">최근로그인</th><th class="center">상태</th><th class="right">포인트머니</th><th class="right">관리</th></tr></thead>
              <tbody id="rosterRows"></tbody>
            </table>
            <div class="nt-listnav incard"><div class="numberBox"><p class="number">전체 <span class="n-color" id="rosterCount">0</span>명</p></div></div>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <div id="site-footer-mount"></div>
      </div><!-- /.content_area -->
    </div>

    <!-- 공통 모달: ../common/classroom-modals.js 가 body 끝에 주입 -->

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <!-- xlsx 파싱 (일괄 등록용) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
