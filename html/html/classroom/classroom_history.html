<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>활동 이력 - 세븐닷 교사용 관리자</title>

    <!-- 통일 디자인 시스템 (실제 앱과 동일) -->
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <!-- Google Material Symbols (아이콘 통일) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <!-- 페이지 전용 스타일 -->
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="history">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">
      <!-- 페이지 헤더 + 반 선택 -->
      <div class="page-header">
        <div>
          <h2>활동 이력</h2>
        </div>
      </div>

      <!-- ==== 활동 이력 ==== -->
      <section class="cd-view active" id="view-history">
        <div class="cd-view-toolbar">
          <div class="cd-desc">포인트 적립·사용, 포인트장터 신청, 알림게시판 게시, AI 코멘트 등 모든 활동 이력을 한곳에서 봅니다.</div>
        </div>

        <div class="summary-cards">
          <div class="sc-card"><div class="sc-k">포인트 내역</div><div class="sc-v" id="histBrickCount">0</div><div class="sc-sub">적립·사용·공동목표</div></div>
          <div class="sc-card"><div class="sc-k">포인트장터 신청</div><div class="sc-v info" id="histMarketCount">0</div><div class="sc-sub">승인·대기</div></div>
          <div class="sc-card"><div class="sc-k">알림게시판 게시</div><div class="sc-v" id="histBoardCount">0</div><div class="sc-sub">게시판 등</div></div>
          <div class="sc-card"><div class="sc-k">AI 코멘트</div><div class="sc-v" id="histAiCount">0</div><div class="sc-sub">생성·저장</div></div>
        </div>

        <div class="section-box">
          <div class="tab-pills cd-hfilter" id="historyFilter">
            <button class="active" type="button" data-hfilter="all">전체</button>
            <button type="button" data-hfilter="brick">포인트</button>
            <button type="button" data-hfilter="market">포인트장터</button>
            <button type="button" data-hfilter="board">알림게시판</button>
            <button type="button" data-hfilter="ai">AI 코멘트</button>
          </div>
          <div class="section-body tbl">
            <table class="tbl">
              <thead><tr><th>시간</th><th>구분</th><th>대상</th><th>내용</th><th class="right">비고</th></tr></thead>
              <tbody id="historyRows"></tbody>
            </table>
            <div class="nt-listnav incard">
              <div class="numberBox"><p class="number">총 <span class="n-color" id="historyCount">0건</span></p></div>
              <span class="cd-desc">최근 활동 순</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <div id="site-footer-mount"></div>
      </div><!-- /.content_area -->
    </div>

    <!-- 공통 모달: ../common/classroom-modals.js 가 body 끝에 주입 -->

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
