<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생 상세 - 세븐닷 교사용 관리자</title>
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="student-detail">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">

        <!-- 페이지 헤더 -->
        <div class="page-header cd-detail-ph">
          <div class="cd-detail-ph-left">
            <button class="cd-back-btn" type="button" data-action="goBackStudents">
              <span class="material-symbols-outlined">arrow_back</span>
              학생 목록
            </button>
            <div class="cd-detail-hero">
              <div class="cd-detail-avatar" id="sdAvatar"></div>
              <div>
                <h2 class="cd-detail-name" id="sdName">-</h2>
                <div class="cd-detail-tags" id="sdTags"></div>
              </div>
            </div>
          </div>
          <div class="cd-detail-ph-right">
            <div class="cd-detail-balance">
              <span class="cd-desc">포인트 잔액</span>
              <b><span id="sdBalance">0</span>p</b>
            </div>
            <div class="cd-detail-nav">
              <button type="button" data-action="sdPrev" title="이전 학생">
                <span class="material-symbols-outlined">chevron_left</span>
              </button>
              <span class="cd-detail-pos" id="sdTitle"></span>
              <button type="button" data-action="sdNext" title="다음 학생">
                <span class="material-symbols-outlined">chevron_right</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 탭 -->
        <div class="tab-pills cd-detail-tabs" id="sdTabs">
          <button class="active" type="button" data-sdtab="brick">
            <span class="material-symbols-outlined">workspace_premium</span> 포인트
          </button>
          <button type="button" data-sdtab="learning">
            <span class="material-symbols-outlined">menu_book</span> 학습 현황
          </button>
          <button type="button" data-sdtab="report">
            <span class="material-symbols-outlined">summarize</span> 리포트
          </button>
          <button type="button" data-sdtab="account">
            <span class="material-symbols-outlined">manage_accounts</span> 계정정보
          </button>
        </div>

        <!-- ── 탭 콘텐츠 ── -->
        <div class="cd-detail-panes">

          <!-- 포인트 탭 -->
          <div class="cd-detail-pane active" data-sdpane="brick">
            <div class="cd-detail-2col">

              <!-- 왼쪽: 잔액 + 받은 칭찬 + 포인트 지급 (모달과 같은 DOM 순서) -->
              <div class="cd-detail-col-main">
                <div class="section-box">
                  <div class="cd-sd-balance-card">
                    <div class="cd-sd-bc-label">포인트 잔액</div>
                    <div class="cd-sd-bc-value"><span id="sdBalanceLg">0</span><small>p</small></div>
                    <div class="cd-sd-bc-week" id="sdWeekEarned"></div>
                    <div class="cd-sd-bc-contrib" id="sdGoalContrib"></div>
                  </div>
                </div>
                <div class="section-box">
                  <div class="section-head"><div class="title">받은 칭찬</div></div>
                  <div class="section-body">
                    <div id="sdPraiseHistory"></div>
                  </div>
                </div>
                <div class="section-box">
                  <div class="section-head">
                    <div class="title">포인트 지급</div>
                    <button class="cd-link" type="button" data-action="openPraiseReasonManage">칭찬 사유 관리 →</button>
                  </div>
                  <div class="section-body">
                    <div class="cd-reasons" id="praiseReasons"></div>
                    <div class="cd-give-bar">
                      <div class="cd-give-row">
                        <div class="cd-stepper">
                          <button type="button" data-step="-">-</button>
                          <span id="giveAmount">5</span>
                          <button type="button" data-step="+">+</button>
                        </div>
                        <button class="btn primary" type="button" data-action="give" id="giveBtn">+5 포인트 지급</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 오른쪽: 포인트 내역 -->
              <div class="cd-detail-col-side">
                <div class="section-box">
                  <div class="section-head">
                    <div class="title">포인트 내역</div>
                    <div class="cd-sd-ledger-filter">
                      <button class="active" type="button" data-ledger-filter="all">전체</button>
                      <button type="button" data-ledger-filter="적립">적립</button>
                      <button type="button" data-ledger-filter="사용">사용</button>
                    </div>
                  </div>
                  <div class="section-body">
                    <div class="cd-ledger-list" id="sdLedger"></div>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- 학습 현황 탭 -->
          <div class="cd-detail-pane" data-sdpane="learning">
            <div class="section-box">
              <div class="section-head">
                <div class="title">학습 현황</div>
                <div class="cd-sd-sub-tabs" id="sdLearningPeriod">
                  <button class="active" type="button" data-period="today">오늘 학습</button>
                  <button type="button" data-period="week">이번 주</button>
                  <button type="button" data-period="month">이번 달</button>
                </div>
              </div>
              <div class="section-body">
                <div data-period-pane="today">
                  <div class="cd-day-nav">
                    <button type="button" data-action="sdDayPrev" class="cd-day-nav-btn" title="이전 날짜">
                      <span class="material-symbols-outlined">chevron_left</span>
                    </button>
                    <span id="sdDayLabel" class="cd-day-nav-label"></span>
                    <button type="button" data-action="sdDayNext" class="cd-day-nav-btn" id="sdDayNextBtn" title="다음 날짜">
                      <span class="material-symbols-outlined">chevron_right</span>
                    </button>
                  </div>
                  <div class="cd-learning-cards" id="sdLearningCards"></div>
                </div>
                <div data-period-pane="week" hidden>
                  <div class="cd-sd-stat-row">
                    <div class="cd-sd-stat"><span class="cd-sd-stat-v" id="sdWeekDays">-</span><span class="cd-sd-stat-k">학습일</span></div>
                    <div class="cd-sd-stat"><span class="cd-sd-stat-v" id="sdWeekPts">-</span><span class="cd-sd-stat-k">획득 포인트</span></div>
                    <div class="cd-sd-stat"><span class="cd-sd-stat-v" id="sdWeekGold">-</span><span class="cd-sd-stat-k">골드 브릭</span></div>
                  </div>
                  <div class="cd-sd-schedule" id="sdWeekSchedule"></div>
                </div>
                <div data-period-pane="month" hidden>
                  <div class="cd-month-nav">
                    <button type="button" data-action="sdMonthPrev"><span class="material-symbols-outlined">chevron_left</span></button>
                    <span id="sdMonthLabel" class="cd-month-nav-label"></span>
                    <button type="button" data-action="sdMonthNext"><span class="material-symbols-outlined">chevron_right</span></button>
                  </div>
                  <div class="cd-month-stat-cards" id="sdMonthSummary"></div>
                  <div class="cd-sd-month-cal" id="sdMonthCal"></div>
                  <div class="cd-sd-month-legend" id="sdMonthSubjChips"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- 리포트 탭 -->
          <div class="cd-detail-pane" data-sdpane="report">
            <div class="cd-detail-2col">
              <div class="cd-detail-col-main">
                <!-- 기간 + KPI -->
                <div class="section-box">
                  <div class="section-head">
                    <div class="title">리포트</div>
                    <div class="cd-sd-sub-tabs">
                      <button class="active" type="button" data-report-period="week">주간</button>
                      <button type="button" data-report-period="month">월간</button>
                    </div>
                  </div>
                  <div class="section-body">
                    <div class="cd-report-stats">
                      <div class="cd-rs-card"><span class="cd-rs-v" id="sdRptDone">-</span><span class="cd-rs-k">학습완료율</span></div>
                      <div class="cd-rs-card"><span class="cd-rs-v" id="sdRptDays">-</span><span class="cd-rs-k">학습일수</span></div>
                      <div class="cd-rs-card"><span class="cd-rs-v" id="sdRptPts">-</span><span class="cd-rs-k">획득 포인트</span></div>
                      <div class="cd-rs-card"><span class="cd-rs-v" id="sdRptPraise">-</span><span class="cd-rs-k">받은 칭찬</span></div>
                    </div>
                  </div>
                </div>
                <!-- 학습 보고서 -->
                <div class="section-box">
                  <div class="section-head">
                    <div class="title">학습 보고서</div>
                    <span class="cd-desc" id="sdGrowthPeriod">5월 → 6월 · 과목별</span>
                  </div>
                  <div class="section-body">
                    <div class="cd-growth-highlight" id="sdGrowthHighlight"></div>
                    <div class="cd-growth-subjects" id="sdGrowthSubjects"></div>
                    <p class="cd-desc" style="margin-top:10px;font-size:14px">* 세븐닷 주간/월간 학습 보고서(진도·회차·일별 학습) + 숙련도(정답·오답·브릭) 데이터 연동 — 현재는 예시 데이터</p>
                  </div>
                </div>
                <!-- 리포트 작성 -->
                <div class="section-box">
                  <div class="section-head">
                    <div class="title">작성된 리포트</div>
                    <span class="cd-rpt-count muted" id="sdRptCount">0 / 3</span>
                    <button class="btn-sm" type="button" data-action="addReport" id="addReportBtn">+ 작성</button>
                  </div>
                  <div class="section-body">
                    <div class="cd-report-list" id="sdReportList">
                      <div class="cd-desc" style="padding:10px 0">아직 작성된 리포트가 없습니다.</div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- 칭찬 이력 -->
              <div class="cd-detail-col-side">
                <div class="section-box">
                  <div class="section-head"><div class="title">받은 칭찬</div></div>
                  <div class="section-body">
                    <div class="cd-praise-list" id="praiseList"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 계정정보 탭 -->
          <div class="cd-detail-pane" data-sdpane="account">
            <div class="cd-detail-2col">
              <div class="cd-detail-col-main">

                <!-- 학원 전용: 소속 반 + 수강료 결제 내역 -->
                <div class="section-box" id="sdAcademyBox" hidden>
                  <div class="section-head"><div class="title">학원 정보</div></div>
                  <div class="section-body">
                    <div class="cd-sd-grouprow">소속 반 <b id="sdGroup">-</b></div>
                    <div class="cd-bank-sub-title" style="margin-top:14px">이용권 결제 내역</div>
                    <div class="tbl"><table class="tbl">
                      <thead><tr><th>월</th><th class="right">이용권 금액</th><th class="center">납부일</th><th class="center">상태</th></tr></thead>
                      <tbody id="sdPayments"></tbody>
                    </table></div>
                  </div>
                </div>

                <!-- 기본 정보 -->
                <div class="section-box">
                  <div class="section-head"><div class="title">기본 정보</div></div>
                  <div class="section-body">
                    <div class="cd-acct-grid">
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">이름</label>
                        <input class="form-input" id="acctName" type="text" />
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">번호</label>
                        <input class="form-input" id="acctClassNum" type="number" min="1" max="50" />
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">학년</label>
                        <select class="form-input" id="acctGrade">
                          <option>초1</option><option>초2</option><option>초3</option>
                          <option>초4</option><option>초5</option><option>초6</option>
                          <option>중1</option><option>중2</option><option>중3</option>
                        </select>
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">생년월일</label>
                        <input class="form-input" id="acctBirth" type="date" />
                      </div>
                    </div>
                  </div>
                </div>

                <!-- 계정 정보 -->
                <div class="section-box">
                  <div class="section-head"><div class="title">계정</div></div>
                  <div class="section-body">
                    <div class="cd-acct-grid">
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">로그인 ID</label>
                        <input class="form-input" id="acctLoginId" type="text" placeholder="이메일 또는 아이디" />
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">상태</label>
                        <select class="form-input" id="acctStatus">
                          <option value="정상이용">정상이용</option>
                          <option value="일시정지">일시정지</option>
                          <option value="탈퇴">탈퇴</option>
                        </select>
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">이용기간 시작</label>
                        <input class="form-input" id="acctStart" type="date" />
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">이용기간 종료</label>
                        <input class="form-input" id="acctEnd" type="date" />
                      </div>
                    </div>
                    <button class="btn-sm" type="button" data-action="resetStudentPw" style="margin-top:12px">
                      <span class="material-symbols-outlined" style="font-size:15px;vertical-align:-3px">lock_reset</span>
                      비밀번호 초기화
                    </button>
                  </div>
                </div>

              </div>
              <div class="cd-detail-col-side">

                <!-- 학부모 정보 -->
                <div class="section-box">
                  <div class="section-head"><div class="title">학부모</div></div>
                  <div class="section-body">
                    <div class="cd-acct-grid cd-acct-grid-1col">
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">이름</label>
                        <input class="form-input" id="acctParentName" type="text" />
                      </div>
                      <div class="cd-acct-field">
                        <label class="cd-acct-label">연락처</label>
                        <input class="form-input" id="acctParentPhone" type="tel" placeholder="010-0000-0000" />
                      </div>
                      <div class="cd-acct-field" style="grid-column:1/-1">
                        <label class="cd-acct-label">메모</label>
                        <textarea class="form-input cd-acct-memo" id="acctMemo" rows="3" placeholder="교사 메모 (학생에게 비공개)"></textarea>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
            <!-- 저장 + 삭제 (하단 전체폭) -->
            <div class="cd-acct-foot">
              <button class="btn-sm reject" type="button" data-action="deleteStudentFromDetail">학생 삭제</button>
              <button class="btn primary" type="button" data-action="saveStudentAccount">저장</button>
            </div>
          </div>

        </div><!-- /cd-detail-panes -->

        <div id="site-footer-mount"></div>
      </div>
    </div>

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
