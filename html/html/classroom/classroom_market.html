<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포인트장터 - 세븐닷 교사용 관리자</title>

    <!-- 통일 디자인 시스템 (실제 앱과 동일) -->
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <!-- Google Material Symbols (아이콘 통일) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <!-- 페이지 전용 스타일 -->
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />

    <!--
================================================================================
  세븐닷 - 교사용 반 대시보드 (Classroom Dashboard)
================================================================================
  [목적]
    담임/담당 교사가 한 반의 학습 현황·포인트머니·칭찬·공동목표·포인트장터·
    게시판을 한 화면에서 운영.

  [구성]  상단 탭(.tab-pills) 으로 7개 화면 전환
    1. 반 홈     — 오늘 현황 요약 + 확인할 일 + 게시판 상태
    2. 학생        — 학생 카드 그리드 + 공동목표 + 최근 활동
    3. 포인트머니    — 통장 내역 + 학생별 잔액 + 빠른 지급
    4. 포인트장터    — 쿠폰 등록/관리 + 사용 신청 승인
    5. 주간리포트  — 학습 요약 + AI 코멘트
    6. 알림게시판  — 게시판 작성 + 게시 내역
    7. 설정        — 반/보상/장터 기준

  [데이터]  현재는 js/classroom_dashboard.js 의 mock 배열. 실제 연동 시
    GET /admin/classroom/{classId}/dashboard 등으로 교체.

  [권한]  ROLE_TEACHER
================================================================================
-->
  </head>
  <body class="sevendot-admin" data-page="market">
    <header class="cd-topbar">
<div class="cd-tb-brand">세븐닷 교사용 관리자 <span class="cd-tb-sub">세븐학원</span></div>
      <div class="cd-tb-right">
        <button class="cd-tb-link" type="button" data-action="topAlert">알림</button>
        <a class="cd-tb-link" href="../notice/notice_list.html">공지사항</a>
        <a class="cd-tb-link" href="../inquiry/inquiry_list.html">고객센터</a>
        <span class="cd-tb-acct">김선생님</span>
      </div>
    </header>

    <!-- 좌측 사이드바 (실제 앱에서는 레이아웃 데코레이터가 제공 — 프로토타입은 직접 렌더) -->
    <nav class="cd-side">
      <button class="cd-side-acct" type="button" data-action="openOrgInfo">세븐초등학교 (4-1) <span class="cd-arrow">›</span></button>
      <div class="cd-side-menu" id="cdSideMenu"><!-- JS 렌더 --></div>
      <div class="cd-side-promo"><b>세븐닷 사용 가이드</b><span>반 운영과 보상 설정이 처음이라면 FAQ에서 빠르게 확인하세요.</span></div>
    </nav>

    <div class="rightBoxNT">
      <div class="content_area">
      <!-- 페이지 헤더 + 반 선택 -->
      <div class="page-header">
        <div>
          <h2>포인트장터</h2>
        </div>
      </div>

      <!-- ==== 포인트장터 ==== -->
      <section class="cd-view active" id="view-market">
        <div class="cd-view-toolbar">
          <div class="cd-desc">선생님이 쿠폰을 등록하고 학생 신청을 승인합니다.</div>
          <div class="cd-head-actions">
            <button class="btn" type="button" data-action="loadCouponExamples">예시 쿠폰 불러오기</button>
            <button class="btn primary" type="button" data-action="openCoupon">＋ 선생님 쿠폰 등록</button>
          </div>
        </div>

        <div class="guideBox tip">
          <p>선생님 쿠폰 등록</p>
          <ul><li>자리 우선권, 독서 자리 선택권, 반 음악 신청권처럼 우리 반에 맞는 쿠폰을 직접 만들 수 있습니다.</li></ul>
        </div>

        <div class="summary-cards">
          <div class="sc-card"><div class="sc-k">등록 쿠폰</div><div class="sc-v" id="couponCount">0</div><div class="sc-sub">학생 화면 표시</div></div>
          <div class="sc-card"><div class="sc-k">오늘 사용 신청</div><div class="sc-v warning couponWait">0건</div><div class="sc-sub">교사 승인 필요</div></div>
          <div class="sc-card"><div class="sc-k">인기 쿠폰</div><div class="sc-v sc-text" id="popularCoupon">자리 우선권</div><div class="sc-sub">이번 주 8회</div></div>
          <div class="sc-card"><div class="sc-k">장터 운영 상태</div><div class="sc-v success sc-text">운영 중</div><div class="sc-sub">금요일 자동 마감</div></div>
        </div>

        <div class="cd-coupons" id="couponGrid"></div>

        <div class="section-box">
          <div class="section-head"><div class="title">쿠폰 사용 신청 현황</div></div>
          <div class="section-body tbl">
            <table class="tbl">
              <thead><tr><th>학생</th><th>쿠폰</th><th class="right">가격</th><th>신청 시간</th><th class="center">상태</th><th class="right">관리</th></tr></thead>
              <tbody id="couponRequests"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <div id="site-footer-mount"></div>
      </div><!-- /.content_area -->
    </div>

    <!-- ======================================================================
     모달
     ====================================================================== -->

    <!-- 공통 모달: ../../js/admin/classroom/classroom-modals.js 가 body 끝에 주입 -->

    <div class="cd-toast" id="toast"></div>

    <!-- 공통 스크립트 -->
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <!-- 페이지 전용 스크립트 -->
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
