<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포인트장터 - 세븐닷 교사용 관리자</title>

    <!-- 통일 디자인 시스템 (실제 앱과 동일) -->
    <link rel="stylesheet" href="../../css/admin/classroom/tokens.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/sevendot-admin.css" />
    <link rel="stylesheet" href="../../css/admin/classroom/standalone.css" />
    <!-- Google Material Symbols (아이콘 통일) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />
    <!-- 페이지 전용 스타일 -->
    <link rel="stylesheet" href="../../css/admin/classroom/classroom_dashboard.css" />
  </head>
  <body class="sevendot-admin" data-page="market">
    <header class="cd-topbar" data-shell="topbar"></header>
    <nav class="cd-side" data-shell="sidebar"></nav>

    <div class="rightBoxNT">
      <div class="content_area">
      <!-- 페이지 헤더 + 반 선택 -->
      <div class="page-header">
        <div>
          <h2>포인트장터</h2>
        </div>
      </div>

      <!-- ==== 포인트장터 ==== -->
      <section class="cd-view active" id="view-market">
        <div class="cd-view-toolbar">
          <div class="cd-desc">쿠폰을 등록하고 학생의 신청을 승인합니다.</div>
          <div class="cd-head-actions">
            <button class="btn" type="button" data-action="loadCouponExamples">예시 쿠폰 불러오기</button>
            <button class="btn primary" type="button" data-action="openCoupon">+ 쿠폰 등록</button>
          </div>
        </div>

        <div class="guideBox tip">
          <p>쿠폰 등록</p>
          <ul><li>자리 우선권, 독서 자리 선택권, 반 음악 신청권처럼 우리 반에 맞는 쿠폰을 직접 만들 수 있습니다.</li></ul>
        </div>

        <div class="summary-cards cols-3">
          <div class="sc-card"><div class="sc-k">등록 쿠폰</div><div class="sc-v" id="couponCount">0</div><div class="sc-sub">학생 화면 표시</div></div>
          <div class="sc-card"><div class="sc-k">오늘 사용 신청</div><div class="sc-v warning couponWait">0건</div><div class="sc-sub">교사 승인 필요</div></div>
          <div class="sc-card"><div class="sc-k">인기 쿠폰</div><div class="sc-v sc-text" id="popularCoupon">-</div><div class="sc-sub" id="popularCouponSub">이번 주 0회</div></div>
        </div>

        <div class="cd-coupons" id="couponGrid"></div>

        <div class="section-box">
          <div class="section-head"><div class="title">쿠폰 사용 신청 현황</div></div>
          <div class="section-body tbl">
            <table class="tbl">
              <thead><tr><th>학생</th><th>쿠폰</th><th class="right">가격</th><th>신청 시간</th><th class="center">상태</th><th class="right">관리</th></tr></thead>
              <tbody id="couponRequests"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <div id="site-footer-mount"></div>
      </div><!-- /.content_area -->
    </div>

    <!-- 공통 모달: ../common/classroom-modals.js 가 body 끝에 주입 -->

    <div class="cd-toast" id="toast"></div>
    <script src="../../js/admin/classroom/classroom-shell.js"></script>
    <script src="../../js/admin/common.js"></script>
    <script src="../../js/admin/footer.js"></script>
    <script src="../../js/admin/classroom/classroom-modals.js"></script>
    <script src="../../js/admin/classroom/classroom_dashboard.js"></script>
  </body>
</html>
